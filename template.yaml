AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Sylli

  Sample SAM Template for Sylli

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Api:
    BinaryMediaTypes:
      - multipart/form-data
      - application/pdf
    # Ensure CORS headers are present on API Gateway-level error responses (e.g. 403, 502, 504).
    # Without this, Gateway Responses (errors that bypass Lambda) lack Access-Control-Allow-Origin
    # and the browser throws TypeError: Failed to fetch instead of a usable error.
    GatewayResponses:
      DEFAULT_4XX:
        ResponseParameters:
          Headers:
            Access-Control-Allow-Origin: "'http://localhost:3000'"
            Access-Control-Allow-Headers: "'*'"
      DEFAULT_5XX:
        ResponseParameters:
          Headers:
            Access-Control-Allow-Origin: "'http://localhost:3000'"
            Access-Control-Allow-Headers: "'*'"
  Function:
    Timeout: 30

    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
Resources:
  SylliFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: backend/
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Environment:
        Variables:
          SYLLABUS_BUCKET: sylli-syllabus-bucket
          SYLLABUS_TABLE: sylli-syllabus-table
          USERS_TABLE: sylli-users-table
          JWT_SECRET: "dev-secret-replace-for-prod"  # TODO: use SSM for prod
          MATERIALS_BUCKET: sylli-materials-bucket
          MATERIALS_TABLE: sylli-materials-table
          EMBED_FUNCTION_NAME: !Ref EmbedWorkerFunction
          VECTOR_BUCKET_NAME: sylli-vectors
          VECTOR_INDEX_NAME: materials-index
          AWS_REGION_NAME: us-east-1
      Policies:
        - S3WritePolicy:
            BucketName: sylli-syllabus-bucket
        - S3ReadPolicy:
            BucketName: sylli-syllabus-bucket
        - DynamoDBWritePolicy:
            TableName: sylli-syllabus-table
        - DynamoDBReadPolicy:
            TableName: sylli-syllabus-table
        - DynamoDBWritePolicy:
            TableName: sylli-users-table
        - DynamoDBReadPolicy:
            TableName: sylli-users-table
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
        - S3WritePolicy:
            BucketName: sylli-materials-bucket
        - S3ReadPolicy:
            BucketName: sylli-materials-bucket
        - DynamoDBWritePolicy:
            TableName: sylli-materials-table
        - DynamoDBReadPolicy:
            TableName: sylli-materials-table
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
              Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/sylli-materials-table"
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt EmbedWorkerFunction.Arn
        - Statement:
            - Effect: Allow
              Action:
                - s3vectors:QueryVectors
                - s3vectors:GetVectors
              Resource: "*"
      Events:
        Sylli:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: any

  SyllabusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sylli-syllabus-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: syllabus_id
          AttributeType: S
      KeySchema:
        - AttributeName: syllabus_id
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sylli-users-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH

  SyllabusBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: sylli-syllabus-bucket

  EmbedWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: workers.embed_worker.lambda_handler
      Runtime: python3.13
      Architectures:
        - arm64
      Timeout: 300
      Environment:
        Variables:
          MATERIALS_BUCKET: sylli-materials-bucket
          MATERIALS_TABLE: sylli-materials-table
          VECTOR_BUCKET_NAME: sylli-vectors
          VECTOR_INDEX_NAME: materials-index
          AWS_REGION_NAME: us-east-1
      Policies:
        - S3ReadPolicy:
            BucketName: sylli-materials-bucket
        - DynamoDBWritePolicy:
            TableName: sylli-materials-table
        - DynamoDBReadPolicy:
            TableName: sylli-materials-table
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
            - Effect: Allow
              Action:
                - s3vectors:PutVectors
              Resource: "*"

  MaterialsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: sylli-materials-bucket

  MaterialsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: sylli-materials-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: material_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: uploaded_at
          AttributeType: S
      KeySchema:
        - AttributeName: material_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user_id-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: uploaded_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: 'true'
Outputs:
  # ServerlessRestApi is an implicit API created out of Events key under Serverless::Function
  # Find out more about other implicit resources you can reference within SAM
  # https://github.com/awslabs/serverless-application-model/blob/master/docs/internals/generated_resources.rst#api
  SylliApi:
    Description: API Gateway endpoint URL for Prod stage for Sylli function
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/hello/"
  SylliFunction:
    Description: Sylli Lambda Function ARN
    Value: !GetAtt SylliFunction.Arn
  SylliFunctionIamRole:
    Description: Implicit IAM Role created for Sylli function
    Value: !GetAtt SylliFunctionRole.Arn
